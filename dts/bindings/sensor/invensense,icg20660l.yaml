description: ICG20660L 6-Axis IMU

compatible: "invensense,icg20660l"

include: sensor-device.yaml

properties:
  reg:
    required: true
    description: I2C address

  int-gpios:
    type: phandle-array
    description: |
      GPIO pin for data ready interrupt. The pin should be configured
      as active high.

  accel-hz:
    type: int
    default: 100
    description: Accelerometer output data rate in Hz

  gyro-hz:
    type: int
    default: 100
    description: Gyroscope output data rate in Hz

  accel-fs:
    type: int
    default: 0
    enum:
      - 0  # 2g
      - 8  # 4g
      - 16 # 8g
      - 24 # 16g
    description: Accelerometer full scale in g

  gyro-fs:
    type: int
    default: 0
    enum:
      - 0  # ±125 dps
      - 8  # ±250 dps
      - 16 # ±500 dps
    description: |
      Gyroscope full-scale selection. These are raw register values written to
      GYRO_CONFIG[4:3] (i.e., FS_SEL << 3). 0 selects ±125 dps, 8 selects
      ±250 dps, and 16 selects ±500 dps.
