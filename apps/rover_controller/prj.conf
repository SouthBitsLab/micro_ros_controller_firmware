CONFIG_GPIO=y
CONFIG_CPP=y

CONFIG_MAIN_STACK_SIZE=25000
CONFIG_MAIN_THREAD_PRIORITY=3

CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n
CONFIG_PTHREAD_IPC=n

CONFIG_POSIX_API=y
CONFIG_POSIX_CLOCK=y

CONFIG_STDOUT_CONSOLE=y
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# Sensor / I2C / SPI support for IMU and wattmeter.
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_SPI=y

# Devicetree-enabled hardware drivers.
CONFIG_ICG20660L=y
CONFIG_ICG20660L_TRIGGER_OWN_THREAD=y
CONFIG_INA219=y

# GNSS support for rover.
CONFIG_GNSS=y
CONFIG_GNSS_SATELLITES=y
CONFIG_GNSS_DUMP_TO_LOG=n
CONFIG_GNSS_LOG_LEVEL_DBG=y
# a temporary workaround for the DFROBOT GNSS module, which has a non-standard GNSS message format. This should be removed once the module is updated to a standard format. 
CONFIG_GNSS_DFROBOT_GNSS_AND_RTC=y
# CONFIG_GNSS_NMEA_GENERIC is not set

#
# libmicroros (/home/jacob/Desktop/stable-v4.1-jazzy/micro_ros_zephyr_module/modules/libmicroros)
#
CONFIG_MICROROS=y
CONFIG_APP_LINK_WITH_MICROROS=y
# CONFIG_MICROROS_TRANSPORT_SERIAL is not set
# CONFIG_MICROROS_TRANSPORT_SERIAL_USB is not set
CONFIG_MICROROS_TRANSPORT_UDP=y

# Increase the number of micro-ROS entities to support all rover publishers
# (heartbeat, imu, odom, wheel_states, battery, gnss, diagnostics) plus one
# spare. The default of 1 causes the second publisher creation to fail.
CONFIG_MICROROS_PUBLISHERS="8"
CONFIG_MICROROS_SUBSCRIBERS="2"

# Networking config
CONFIG_NETWORKING=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=n
CONFIG_NET_IPV6=n
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_MAX_FDS=16
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_L2_ETHERNET=y

# Network buffers
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_CONTEXT_NET_PKT_POOL=y

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_DHCPV4=y

# Logging
CONFIG_NET_LOG=y
CONFIG_SERIAL=y
CONFIG_NET_STATISTICS=y
CONFIG_PRINTK=y
